# ============================================================================
# AI tools declaration (transparency only — not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"        # Claude Code: architecture, EDA, implementation, profiling

ai_usage_summary: |
  Used Claude (Claude Code) as a pair-programmer for exploratory data analysis,
  architecture design, implementation, and performance profiling. All design
  decisions (the contrastive-anchor semantic signal, the anti-stuffing skill
  trust weighting, the honeypot impossibility checks, the behavioral modifier
  calibration) were derived from EDA on the provided pool and are inspectable in
  the code. No candidate data is sent to any LLM at ranking time — the ranker is
  a deterministic, CPU-only scoring system.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid, CPU-only ranker. Final score blends a structured JD-fit score (0.70)
  with a contrastive static-embedding semantic score (0.30), then multiplies by a
  behavioral availability modifier and a honeypot impossibility gate.

  Structured fit encodes the JD's intent: title coherence (the decisive signal
  against keyword stuffers, whose real title is "Marketing Manager"), career
  evidence read from descriptions (built retrieval/ranking/recsys in production
  with NDCG/MAP evaluation), 6–8yr experience band, product-vs-services,
  NLP/IR-vs-CV/speech, location, and a trust-weighted skill score that discounts
  stuffed lists (EDA shows skills are ~uniform random noise). The semantic signal,
  cos(cand, JD-ideal) − cos(cand, JD-anti-pattern), surfaces plain-language strong
  candidates and mutes stuffers. Behavioral signals down-weight the unavailable.
  The honeypot gate removes internally-impossible profiles. Reasoning is generated
  from each candidate's own parsed facts (no hallucination), with honest concerns.

